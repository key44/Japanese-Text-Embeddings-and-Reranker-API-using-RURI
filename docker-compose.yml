services:
  embeddings-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8000"
    restart: unless-stopped
    # GPUを有効化
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["0"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
